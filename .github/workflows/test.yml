name: Test Core
on:
  push:
    branches:
      - master
  pull_request:
env:
  RUSTFLAGS: -D warnings

jobs:
  # NOTE: we mainly only "check" if things can compile in extracted crates. 
  cargo-hack:
    runs-on: ${{ matrix.platform.os }}
    name: "cargo-hack ${{ matrix.crate }} ${{ matrix.platform.name }} ${{ matrix.platform.rs }}"
    strategy:
      fail-fast: false
      matrix:
        crate:
          - "near-crypto-hash"
          - "near-sdk-core"
          - "near-global-contracts"
          - "near-sdk-env"
        platform:
          - os: warp-ubuntu-latest-x64-4x
            rs: "1.93.0"
            name: linux
          - os: warp-macos-latest-arm64-6x
            rs: "1.93.0"
            name: macos
    steps:
      - uses: actions/checkout@v4

      - name: Set CC for wasm32 target (MacOS only)
        if: matrix.platform.name == 'macos'
        run: |
          brew install llvm@20
          echo "CC_wasm32_unknown_unknown=$(brew --prefix llvm@20)/bin/clang" >> $GITHUB_ENV

      - name: Install Rust ${{ matrix.platform.rs }} with wasm32 target
        run: |
          rustup toolchain install ${{ matrix.platform.rs }} --profile minimal --target wasm32-unknown-unknown
          rustup override set ${{ matrix.platform.rs }}

      - name: Install cargo-hack
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-hack

      - uses: Swatinem/rust-cache@v2
        with:
          cache-provider: warpbuild
          shared-key: "${{ matrix.crate }}-${{ matrix.platform.name }}-${{ matrix.platform.rs }}"
          cache-all-crates: true

      - name: Print rustc && rustdoc version
        run: rustc --version && rustdoc --version

      # Powerset check across all features for the off-chain / non-NEAR path (cfg(near) not set).
      - name: Cargo hack check wasm32 powerset (off-chain, no --cfg near)
        run: cargo hack check -p ${{ matrix.crate }} --target "wasm32-unknown-unknown" --feature-powerset --exclude-features schemars-v0_8,abi,__near-sdk-unit-testing
      - name: Cargo hack check wasm32 powerset, no dev-deps (off-chain)
        run: cargo hack check -p ${{ matrix.crate }} --target "wasm32-unknown-unknown" --feature-powerset --exclude-features schemars-v0_8,abi,__near-sdk-unit-testing --no-dev-deps
      - name: Cargo hack check non-wasm32 powerset
        run: cargo hack check -p ${{ matrix.crate }} --feature-powerset --no-dev-deps

      # Same powerset but with `--cfg near` set — exercises the on-chain host-function path.
      # cargo-near sets this automatically; we test it here so the contract path doesn't bitrot.
      - name: Cargo hack check wasm32 powerset (on-chain, --cfg near)
        env:
          RUSTFLAGS: "-D warnings --cfg near"
        run: cargo hack check -p ${{ matrix.crate }} --target "wasm32-unknown-unknown" --feature-powerset --exclude-features schemars-v0_8,abi,__near-sdk-unit-testing --no-dev-deps

  test:
    runs-on: ${{ matrix.platform.os }}
    name: "${{ matrix.platform.name }} ${{ matrix.platform.rs }} ${{ matrix.features }}"
    strategy:
      fail-fast: false
      matrix:
        platform:
          - os: warp-ubuntu-latest-x64-4x
            rs: "1.93.0"
            name: linux
          - os: warp-macos-latest-arm64-6x
            rs: "1.93.0"
            name: macos
        features:
          - ""
          - "--features unstable,legacy,__abi-generate,deterministic-account-ids"
          - "--features unstable,deterministic-account-ids,non-contract-usage"
    steps:
      - uses: actions/checkout@v4

      - name: Set CC for wasm32 target (MacOS only)
        if: matrix.platform.name == 'macos'
        run: |
          brew install llvm@20
          echo "CC_wasm32_unknown_unknown=$(brew --prefix llvm@20)/bin/clang" >> $GITHUB_ENV

      - name: Install Rust ${{ matrix.platform.rs }} with wasm32 target
        run: |
          rustup toolchain install ${{ matrix.platform.rs }} --profile minimal --target wasm32-unknown-unknown
          rustup override set ${{ matrix.platform.rs }}

      - name: Install cargo-near CLI
        run: curl --proto '=https' --tlsv1.2 -LsSf https://github.com/near/cargo-near/releases/download/cargo-near-v0.20.2/cargo-near-installer.sh | sh

      - name: Install cargo-nextest
        uses: taiki-e/install-action@v2
        with:
          tool: nextest

      # 2.12 RC: nearcore v2.12.0 ships a sandbox built on protocol version 84,
      # which is what we need to run wasm produced by rustc >= 1.93. The version
      # baked into `near-sandbox` 0.3.9 is v2.11.0 (PV-83), so we download the RC
      # binary explicitly and point `near-workspaces` at it via the
      # `NEAR_SANDBOX_BIN_PATH` env var (honoured by both the build.rs install
      # step and the runtime binary lookup).
      - name: Download near-sandbox 2.12.0
        run: |
          case "${{ matrix.platform.name }}" in
            linux) plat=Linux-x86_64 ;;
            macos) plat=Darwin-arm64 ;;
            *) echo "unsupported platform"; exit 1 ;;
          esac
          mkdir -p "$HOME/.near-sandbox-2.12.0"
          curl -sL "https://s3-us-west-1.amazonaws.com/build.nearprotocol.com/nearcore/${plat}/2.12.0/near-sandbox.tar.gz" \
            | tar -xz -C "$HOME/.near-sandbox-2.12.0" --strip-components=1
          chmod +x "$HOME/.near-sandbox-2.12.0/near-sandbox"
          echo "NEAR_SANDBOX_BIN_PATH=$HOME/.near-sandbox-2.12.0/near-sandbox" >> "$GITHUB_ENV"

      - uses: Swatinem/rust-cache@v2
        with:
          cache-provider: warpbuild
          shared-key: "${{ matrix.platform.name }}-${{ matrix.platform.rs }}"
          cache-all-crates: true

      - name: Print rustc && rustdoc version
        run: rustc --version && rustdoc --version

      - name: Run tests with nextest
        run: cargo nextest run --all ${{ matrix.features }} --profile ci

      # Run doctests separately (nextest doesn't support doctests yet)
      - name: Run doctests
        run: cargo test --all ${{ matrix.features }} --doc

  lint:
    name: Clippy and fmt
    runs-on: warp-ubuntu-latest-x64-4x
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust 1.93 with components
        run: |
          rustup toolchain install 1.93 --profile minimal --component rustfmt,clippy
          rustup override set 1.93

      - uses: Swatinem/rust-cache@v2
        with:
          cache-provider: warpbuild
          shared-key: "linux-1.93-lint"
          cache-all-crates: true

      - name: Test Format
        run: cargo fmt -- --check

      - run: cargo clippy --tests --all-features -- -Dclippy::all
      - run: cargo clippy --tests --features serde,borsh -- -Dclippy::all

  compilation:
    name: Compilation tests
    runs-on: warp-ubuntu-latest-x64-4x
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust 1.93
        run: |
          rustup toolchain install 1.93 --profile minimal
          rustup override set 1.93

      - uses: Swatinem/rust-cache@v2
        with:
          cache-provider: warpbuild
          shared-key: "linux-1.93-compilation"
          cache-all-crates: true

      - name: Compilation tests
        run: cargo test --package near-sdk --test compilation_tests --features __abi-generate --features unstable -- compilation_tests --exact --nocapture

  windows:
    name: Windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Windows toolchain
        run: |
          rustup toolchain install 1.93 --profile minimal --target wasm32-unknown-unknown
          rustup override set 1.93

      # Note: Windows runs on GitHub-hosted runners, not WarpBuild, so we don't use
      # cache-provider: warpbuild here. WarpBuild cache is only for WarpBuild runners.
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: "windows-1.93"
          cache-all-crates: true

      - run: cargo check -p near-sdk --target wasm32-unknown-unknown --features unstable,legacy
      - run: cargo check -p near-sdk --target wasm32-unknown-unknown --no-default-features
      - run: cargo check -p near-sdk --target wasm32-unknown-unknown --no-default-features --features legacy
      - run: cargo check -p near-sdk --target wasm32-unknown-unknown --no-default-features --features unstable
      - run: cargo check -p near-contract-standards --target wasm32-unknown-unknown

  audit:
    name: Audit
    runs-on: warp-ubuntu-latest-x64-4x
    steps:
      - name: Checkout Sources
        uses: actions/checkout@v4

      - name: Install Rust 1.93
        run: |
          rustup toolchain install 1.93 --profile minimal
          rustup override set 1.93

      - uses: Swatinem/rust-cache@v2
        with:
          cache-provider: warpbuild
          shared-key: "linux-audit"
          cache-all-crates: true

      - name: Install Audit
        run: cargo install cargo-audit

      - name: Run Audit
        run: cargo audit

  # there're sometimes warnings, which signal, that the generated doc
  # won't look as expected, when rendered, and sometimes errors, which will prevent doc from being
  # generated at release time altogether.
  cargo-doc:
    runs-on: warp-ubuntu-latest-x64-4x
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        run: |
          rustup toolchain install stable --profile minimal
          rustup override set stable

      - uses: Swatinem/rust-cache@v2
        with:
          cache-provider: warpbuild
          shared-key: "linux-stable-doc"
          cache-all-crates: true

      - name: run cargo doc
        env:
          RUSTDOCFLAGS: -D warnings
        run: |
          cargo doc -p near-sdk --features unstable,legacy,unit-testing,__macro-docs,__abi-generate,deterministic-account-ids
          cargo doc -p near-sdk-macros --features __abi-generate
          cargo doc -p near-contract-standards --no-deps --features abi
          cargo doc -p near-sys
