name: Test Core
on:
  push:
    branches:
      - master
  pull_request:
env:
  RUSTFLAGS: -D warnings

jobs:
  # NOTE: we mainly only "check" if things can compile in extracted crates. Testing is done later by nextest.
  cargo-hack:
    runs-on: ${{ matrix.platform.os }}
    name: "cargo-hack ${{ matrix.crate }} ${{ matrix.platform.name }} ${{ matrix.platform.rs }}"
    strategy:
      fail-fast: false
      matrix:
        crate:
          - "near-crypto-hash"
          - "near-sdk-core"
          - "near-global-contracts"
          - "near-sdk-env"
          - "near-digest"
        platform:
          - os: warp-ubuntu-latest-x64-4x
            rs: "1.93.0"
            name: linux
          - os: warp-macos-latest-arm64-6x
            rs: "1.93.0"
            name: macos
          # Floating `stable` (linux): blocking coverage against current Rust. See the `test` job note.
          - os: warp-ubuntu-latest-x64-4x
            rs: "stable"
            name: linux
    steps:
      - uses: actions/checkout@v4

      - name: Set CC for wasm32 target (MacOS only)
        if: matrix.platform.name == 'macos'
        run: |
          brew install llvm@20
          echo "CC_wasm32_unknown_unknown=$(brew --prefix llvm@20)/bin/clang" >> $GITHUB_ENV

      - name: Install Rust ${{ matrix.platform.rs }} with wasm32 target
        run: |
          rustup toolchain install ${{ matrix.platform.rs }} --profile minimal --target wasm32-unknown-unknown
          rustup override set ${{ matrix.platform.rs }}

      - name: Install cargo-hack
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-hack

      - uses: Swatinem/rust-cache@v2
        with:
          cache-provider: warpbuild
          shared-key: "${{ matrix.crate }}-${{ matrix.platform.name }}-${{ matrix.platform.rs }}"
          cache-all-crates: true

      - name: Print rustc && rustdoc version
        run: rustc --version && rustdoc --version

      # Powerset check across all features for the off-chain / non-NEAR path (cfg(near) not set).
      - name: Cargo hack check wasm32 powerset (off-chain, no --cfg near)
        run: cargo hack check -p ${{ matrix.crate }} --target "wasm32-unknown-unknown" --feature-powerset --exclude-features schemars-v0_8,abi,__near-sdk-unit-testing
      - name: Cargo hack check wasm32 powerset, no dev-deps (off-chain)
        run: cargo hack check -p ${{ matrix.crate }} --target "wasm32-unknown-unknown" --feature-powerset --exclude-features schemars-v0_8,abi,__near-sdk-unit-testing --no-dev-deps
      - name: Cargo hack check non-wasm32 powerset
        run: cargo hack check -p ${{ matrix.crate }} --feature-powerset --no-dev-deps

      # Same powerset but with `--cfg near` set — exercises the on-chain host-function path.
      # cargo-near sets this automatically; we test it here so the contract path doesn't bitrot.
      - name: Cargo hack check wasm32 powerset (on-chain, --cfg near)
        env:
          RUSTFLAGS: "-D warnings --cfg near"
        run: cargo hack check -p ${{ matrix.crate }} --target "wasm32-unknown-unknown" --feature-powerset --exclude-features schemars-v0_8,abi,__near-sdk-unit-testing --no-dev-deps

  # Mechanical half of the "Workspace crate policy" in CONTRIBUTING.md: features must be
  # additive-only. This is a blunt tripwire, not a visibility-aware lint — it bans
  # `not(feature = ...)` cfg predicates outright in the leaf crates' src/, public item or not.
  # near-sdk itself is excluded — it has legitimate internal-only uses (e.g. `expensive-debug`
  # Debug impls, mock internals) that aren't part of its published feature-additivity contract.
  feature-additivity:
    name: Feature additivity (leaf crates)
    runs-on: warp-ubuntu-latest-x64-4x
    steps:
      - uses: actions/checkout@v4

      - name: No cfg(not(feature = ...)) in leaf crates
        run: |
          if grep -rnE 'cfg\s*\(\s*not\s*\(\s*feature' \
            near-sdk-core/src near-sdk-env/src near-crypto-hash/src \
            near-global-contracts/src near-digest/src
          then
            echo "::error::Found cfg(not(feature = ...)) in a leaf crate. Enabling a feature must only add API, never remove it — see 'Workspace crate policy' in CONTRIBUTING.md."
            exit 1
          fi

  test:
    runs-on: ${{ matrix.platform.os }}
    name: "${{ matrix.platform.name }} ${{ matrix.platform.rs }} ${{ matrix.features }}"
    strategy:
      fail-fast: false
      matrix:
        platform:
          - os: warp-ubuntu-latest-x64-4x
            rs: "1.93.0"
            name: linux
          - os: warp-macos-latest-arm64-6x
            rs: "1.93.0"
            name: macos
          # Floating `stable` (linux): a blocking gate, so a new Rust release can turn CI
          # red on an unrelated PR. Deliberate — guarantees near-sdk builds on whatever
          # Rust users have, not just the pinned version.
          - os: warp-ubuntu-latest-x64-4x
            rs: "stable"
            name: linux
        features:
          - ""
          - "--features unstable,legacy,__abi-generate,deterministic-account-ids"
          - "--features unstable,deterministic-account-ids,non-contract-usage"
    steps:
      - uses: actions/checkout@v4

      - name: Set CC for wasm32 target (MacOS only)
        if: matrix.platform.name == 'macos'
        run: |
          brew install llvm@20
          echo "CC_wasm32_unknown_unknown=$(brew --prefix llvm@20)/bin/clang" >> $GITHUB_ENV

      - name: Install Rust ${{ matrix.platform.rs }} with wasm32 target
        run: |
          rustup toolchain install ${{ matrix.platform.rs }} --profile minimal --target wasm32-unknown-unknown
          rustup override set ${{ matrix.platform.rs }}

      - name: Install cargo-near CLI
        run: curl --proto '=https' --tlsv1.2 -LsSf https://github.com/near/cargo-near/releases/download/cargo-near-v0.21.0/cargo-near-installer.sh | sh

      - name: Install cargo-nextest
        uses: taiki-e/install-action@v2
        with:
          tool: nextest

      - uses: Swatinem/rust-cache@v2
        with:
          cache-provider: warpbuild
          shared-key: "${{ matrix.platform.name }}-${{ matrix.platform.rs }}"
          cache-all-crates: true

      - name: Print rustc && rustdoc version
        run: rustc --version && rustdoc --version

      # `store_performance_tests` asserts gas budgets tied to the pinned 1.93 toolchain;
      # the numbers drift with rustc codegen, so skip it on stable rather than loosen
      # the shared threshold. Stable still checks the suite compiles, links, and passes.
      - name: Run tests with nextest
        run: |
          if [ "${{ matrix.platform.rs }}" = "stable" ]; then
            cargo nextest run --all ${{ matrix.features }} --profile ci -E 'not binary(store_performance_tests)'
          else
            cargo nextest run --all ${{ matrix.features }} --profile ci
          fi

      # Run doctests separately (nextest doesn't support doctests yet)
      - name: Run doctests
        run: cargo test --all ${{ matrix.features }} --doc

  # Regression guard: the rest of CI only `cargo check`s wasm32, never linking. A
  # toolchain change can break contract linking (e.g. 1.96 dropping wasm-ld
  # `--allow-undefined`) unnoticed, so link-build a real contract on stable.
  wasm-link:
    name: Example contract links on stable
    runs-on: warp-ubuntu-latest-x64-4x
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable with wasm32 target
        run: |
          rustup toolchain install stable --profile minimal --target wasm32-unknown-unknown
          rustup override set stable

      - uses: Swatinem/rust-cache@v2
        with:
          cache-provider: warpbuild
          shared-key: "linux-stable-wasm-link"
          cache-all-crates: true

      - name: Print rustc version
        run: rustc --version

      - name: Install latest cargo-near CLI
        run: curl --proto '=https' --tlsv1.2 -LsSf https://github.com/near/cargo-near/releases/latest/download/cargo-near-installer.sh | sh

      # `examples/` is outside the workspace, so build from within it. Go through
      # cargo-near (the canonical user path) via `rustup run stable` so a future
      # rust-toolchain.toml pin can't silently downgrade this job off stable.
      - name: Build adder example with cargo-near on stable
        working-directory: examples/adder
        run: rustup run stable cargo near build non-reproducible-wasm

  lint:
    name: Clippy and fmt
    runs-on: warp-ubuntu-latest-x64-4x
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust 1.93 with components
        run: |
          rustup toolchain install 1.93 --profile minimal --component rustfmt,clippy
          rustup override set 1.93

      - uses: Swatinem/rust-cache@v2
        with:
          cache-provider: warpbuild
          shared-key: "linux-1.93-lint"
          cache-all-crates: true

      - name: Test Format
        run: cargo fmt -- --check

      - run: cargo clippy --tests --all-features -- -Dclippy::all
      - run: cargo clippy --tests --features serde,borsh -- -Dclippy::all

  compilation:
    name: Compilation tests
    runs-on: warp-ubuntu-latest-x64-4x
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust 1.93
        run: |
          rustup toolchain install 1.93 --profile minimal
          rustup override set 1.93

      - uses: Swatinem/rust-cache@v2
        with:
          cache-provider: warpbuild
          shared-key: "linux-1.93-compilation"
          cache-all-crates: true

      - name: Compilation tests
        run: cargo test --package near-sdk --test compilation_tests --features __abi-generate --features unstable -- compilation_tests --exact --nocapture

  windows:
    name: Windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Windows toolchain
        run: |
          rustup toolchain install 1.93 --profile minimal --target wasm32-unknown-unknown
          rustup override set 1.93

      # Note: Windows runs on GitHub-hosted runners, not WarpBuild, so we don't use
      # cache-provider: warpbuild here. WarpBuild cache is only for WarpBuild runners.
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: "windows-1.93"
          cache-all-crates: true

      - run: cargo check -p near-sdk --target wasm32-unknown-unknown --features unstable,legacy
      - run: cargo check -p near-sdk --target wasm32-unknown-unknown --no-default-features
      - run: cargo check -p near-sdk --target wasm32-unknown-unknown --no-default-features --features legacy
      - run: cargo check -p near-sdk --target wasm32-unknown-unknown --no-default-features --features unstable
      - run: cargo check -p near-contract-standards --target wasm32-unknown-unknown

  audit:
    name: Audit
    runs-on: warp-ubuntu-latest-x64-4x
    steps:
      - name: Checkout Sources
        uses: actions/checkout@v4

      - name: Install Rust 1.93
        run: |
          rustup toolchain install 1.93 --profile minimal
          rustup override set 1.93

      - uses: Swatinem/rust-cache@v2
        with:
          cache-provider: warpbuild
          shared-key: "linux-audit"
          cache-all-crates: true

      - name: Install Audit
        run: cargo install cargo-audit

      - name: Run Audit
        run: cargo audit

  # there're sometimes warnings, which signal, that the generated doc
  # won't look as expected, when rendered, and sometimes errors, which will prevent doc from being
  # generated at release time altogether.
  cargo-doc:
    runs-on: warp-ubuntu-latest-x64-4x
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        run: |
          rustup toolchain install stable --profile minimal
          rustup override set stable

      - uses: Swatinem/rust-cache@v2
        with:
          cache-provider: warpbuild
          shared-key: "linux-stable-doc"
          cache-all-crates: true

      - name: run cargo doc
        env:
          RUSTDOCFLAGS: -D warnings
        run: |
          cargo doc -p near-sdk --features unstable,legacy,unit-testing,__macro-docs,__abi-generate,deterministic-account-ids
          cargo doc -p near-sdk-macros --features __abi-generate
          cargo doc -p near-contract-standards --no-deps --features abi
          cargo doc -p near-sys
