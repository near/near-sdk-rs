[package]
name = "near-global-contracts"
version = "0.1.0"
edition.workspace = true
license.workspace = true
categories.workspace = true
repository.workspace = true
homepage.workspace = true
rust-version.workspace = true
description = """
Global contract identifiers and deterministic account derivation (NEP-616) for the NEAR SDK. 
"""

[dependencies]
near-account-id = { version = "2.3.0", features = ["internal_unstable"] }
near-crypto-hash = { path = "../near-crypto-hash/", version = "~0.1.0" }

hex = { version = "0.4", optional = true }

cfg_eval = { version = "0.1" }
serde = { version = "1", features = ["derive"], optional = true }
serde_json = { version = "1", features = ["preserve_order"], optional = true }
serde_with = { version = "3", features = [
    "base64",
    "hex",
    "json",
], optional = true }
borsh = { version = "1.0.0", features = ["derive"], optional = true }

arbitrary = { version = "1.4", optional = true }

sha3 = { version = "0.10", optional = true }
near-env = { path = "../near-env/", version = "~0.1.0", optional = true }

near-primitives-core = { version = "0.35", optional = true }

[target.'cfg(not(target_arch = "wasm32"))'.dependencies]
schemars = { version = "0.8.22", optional = true }

[features]
default = []

serde = [
    "dep:serde",
    "dep:serde_json",
    "dep:serde_with",
    "near-account-id/serde",
    "near-crypto-hash/serde",
]

borsh = ["dep:borsh", "near-account-id/borsh", "near-crypto-hash/borsh"]

abi = [
    "dep:schemars",
    "borsh",
    "borsh/unstable__schema",
    "near-account-id/abi",
    "near-crypto-hash/abi",
]

arbitrary = [
    "dep:arbitrary",
    "near-account-id/arbitrary",
    "near-crypto-hash/arbitrary",
]

near-primitives-interop = ["dep:near-primitives-core"]

digest = ["borsh", "dep:sha3", "dep:hex"]

near-contracts = [
    "dep:near-env",
    "dep:hex",
    "serde",
    "borsh",
    "near-crypto-hash/near-contracts",
]

__near-sdk-unit-testing = [
    "near-contracts",
    "near-primitives-interop",
    "near-crypto-hash/__near-sdk-unit-testing",
    "near-env/__near-sdk-unit-testing",
]
